# GNN Model Configuration
model:
  type: "GAT"  # Options: GCN, GAT, GraphSAGE
  hidden_channels: 128
  num_layers: 3
  dropout: 0.3
  heads: 4  # For GAT only
  negative_slope: 0.2  # For GAT only
  aggr: "mean"  # Aggregation method

# Training Configuration
training:
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 10
  validation_split: 0.2
  test_split: 0.1

# Data Configuration
data:
  source: "data/financial_data.csv"
  node_features: ["market_cap", "pe_ratio", "volume", "price"]
  edge_features: ["correlation"]
  target: "price"
  min_correlation: 0.3
  max_edges_per_node: 10

# Visualization Configuration
visualization:
  node_size: 20
  edge_width: 1
  color_map: "viridis"
  layout: "force-directed"  # Options: force-directed, circular, spectral
  interactive: true
  save_plots: true
  plot_format: "png"

# Feature Engineering
features:
  normalize: true
  scale_method: "standard"  # Options: standard, minmax
  use_technical_indicators: true
  technical_indicators:
    - "RSI"
    - "MACD"
    - "Bollinger_Bands"
  window_size: 14

# Graph Construction
graph:
  edge_threshold: 0.5
  max_degree: 50
  self_loops: false
  directed: false
  weighted: true 